name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node: [20, 22, 24]
    name: Testy (Node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Kontrola syntaxe frontendu
        run: for f in public/*.js; do node --check "$f"; done
      - run: npm test

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Docker build
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t skladappka:ci .
